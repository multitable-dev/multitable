name: Bug Report
description: Report a bug in MultiTable
labels: ["bug", "triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `mt ...`
        2. Click on ...
        3. See error
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 14.3, Ubuntu 24.04, Windows 11"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "e.g. 20.11.0"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MultiTable version
      placeholder: "e.g. 0.0.1"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error messages or logs here.
      render: shell
